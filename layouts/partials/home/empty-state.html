{{/* Empty state shown when no products match filters. */}}
<div id="empty-state" class="hidden py-16 text-center">
  <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-neutral-100 mb-4">
    <svg class="w-7 h-7 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
    </svg>
  </div>
  <h3 class="text-base font-semibold text-neutral-900 mb-1">No products found</h3>
  <p class="text-sm text-neutral-500 mb-4">Try adjusting your filters or search term</p>
  <button id="empty-state-reset" class="px-4 py-2 bg-neutral-900 text-white text-sm font-medium rounded-lg hover:bg-neutral-700 transition-colors">Reset filters</button>
</div>
