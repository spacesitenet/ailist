baseURL = "https://signagelist.org/"
languageCode = "en-us"
title = "SignageList"
enableRobotsTXT = true
capitalizeListTitles = false

[taxonomies]
  category = "categories"
  platform = "platforms"

[params]
  description = "A curated directory of 548+ digital signage software products."
  githubRepo = "https://github.com/SignageList/signagelist"

# Custom output formats for LLM-friendly pages
[mediaTypes]
  [mediaTypes."text/plain"]
    suffixes = ["txt"]

[outputFormats]
  [outputFormats.llms]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true
  [outputFormats.llmsfull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "llms", "llmsfull"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[security]
  [security.http]
    urls = ['.*']
    methods = ['(?i)GET']

[caches]
  [caches.getresource]
    dir = ':cacheDir/:project'
    maxAge = '24h'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[module]
  [[module.mounts]]
    source = "node_modules/@fontsource-variable/inter/files"
    target = "static/fonts"
  [[module.mounts]]
    source = "assets"
    target = "assets"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "data"
    target = "data"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
